<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация пациента</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md bg-gray-100 p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">
        Регистрация
    </h1>

    <form class="space-y-4" action="/patient/register" method="post">

        <div>
            <label class="block text-sm font-medium mb-1">
                Email
            </label>
            <input type="email" name="email" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">
                Пароль
            </label>
            <input type="password" name="password" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-400">
        </div>

        <button type="submit"
                class="w-full bg-green-400 hover:bg-green-500 text-white font-semibold py-2 px-4 rounded">
            Зарегистрироваться
        </button>
    </form>
</div>

</body>
</html>
