<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 min-h-screen">

    <!-- Верхнее меню -->
    <nav class="bg-blue-100 p-4">
        <ul class="flex space-x-4">
            <li>
                <a href="/dashboard" class="font-semibold text-gray-900 hover:text-blue-600">
                    Dashboard
                </a>
            </li>
            <li>
                <a href="/profile" class="font-semibold text-gray-900 hover:text-blue-600">
                    Profile
                </a>
            </li>
            <li>
                <a href="/logout" class="font-semibold text-gray-900 hover:text-blue-600">
                    Logout
                </a>
            </li>
        </ul>
    </nav>

    <!-- Основной контент -->
    <main class="p-6">
        <h1 class="text-2xl font-bold mb-4">
            Личный кабинет пациента
        </h1>

        <div class="bg-gray-100 p-4 rounded shadow mb-4">
            <p>ФИО: John Doe</p>
            <p>Год рождения: 1990</p>
            <p>Рост: 180 см</p>
            <p>Вес: 75 кг</p>
        </div>

        <button class="bg-blue-400 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded">
            Изменить данные
        </button>
    </main>

</body>
</html>
