<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль пациента</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-gray-100 p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-6 text-center">
            Заполните ваш профиль
        </h1>

        <form class="space-y-4" action="/patients/me" method="post">
            <div>
                <label class="block text-sm font-medium mb-1">
                    Фамилия
                </label>
                <input
                    type="text"
                    name="last_name"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="Иванов"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">
                    Имя
                </label>
                <input
                    type="text"
                    name="first_name"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="Иван"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">
                    Отчество
                </label>
                <input
                    type="text"
                    name="middle_name"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="Иванович"
                >
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">
                    Год рождения
                </label>
                <input
                    type="number"
                    name="birth_year"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="1990"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">
                    Пол
                </label>
                <select
                    name="sex"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >
                    <option value="">Выберите пол</option>
                    <option value="male">Мужской</option>
                    <option value="female">Женский</option>
                </select>
            </div>

            <button
                type="submit"
                class="w-full bg-blue-400 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded"
            >
                Сохранить профиль
            </button>
        </form>
    </div>

</body>
</html>
